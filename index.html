<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Box Breathing</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Welcome overlay (first-time users) -->
  <div class="overlay" id="welcomeOverlay">
    <h2>Box Breathing</h2>
    <p>4 seconds in, hold, out, hold. 5 minutes to reset your mind.</p>
    <input type="text" class="name-input" id="nameInput" placeholder="Your name" maxlength="20" autocomplete="off">
    <button class="btn-enter" id="btnEnter" disabled>Begin</button>
  </div>

  <!-- Streak banner (top) -->
  <div class="streak-banner" id="streakBanner"></div>

  <!-- Celebration toast (bottom) -->
  <div class="celebration" id="celebration"></div>

  <!-- Breathing app -->
  <div class="app" id="app" data-phase="idle">
    <h1>Box Breathing</h1>

    <div class="breath-container">
      <svg class="progress-svg" viewBox="0 0 280 280">
        <circle class="progress-track" cx="140" cy="140" r="134" />
        <circle class="progress-fill" id="progressArc" cx="140" cy="140" r="134"
                stroke-dasharray="842" stroke-dashoffset="842" />
      </svg>
      <div class="breath-ring"></div>
      <div class="breath-circle"></div>
    </div>

    <div class="phase-info">
      <div class="phase-name" id="phaseName">Ready</div>
      <div class="phase-timer" id="phaseTimer">5:00</div>
    </div>

    <div class="phase-dots">
      <div class="phase-dot" data-dot="inhale"></div>
      <div class="phase-dot" data-dot="hold-in"></div>
      <div class="phase-dot" data-dot="exhale"></div>
      <div class="phase-dot" data-dot="hold-out"></div>
    </div>

    <div class="stats">
      <div>Cycle: <span id="cycleCount">0</span> / <span id="cycleTotal">18</span></div>
      <div>Time: <span id="timeRemaining">5:00</span></div>
    </div>

    <div class="streak-stats">
      <div><span class="fire">🔥</span> Streak: <span class="streak-val" id="currentStreak">0</span></div>
      <div>Best: <span class="streak-val" id="longestStreak">0</span></div>
      <div>Sessions: <span class="streak-val" id="totalSessions">0</span></div>
    </div>

    <div class="idle-text" id="idleText">Press Start to begin</div>

    <div class="controls">
      <button class="btn btn-start" id="btnStart">Start</button>
      <button class="btn btn-reset" id="btnReset" disabled>Reset</button>
    </div>
  </div>

  <!-- Modules (order matters: streak → ui → app) -->
  <script src="js/streak.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
